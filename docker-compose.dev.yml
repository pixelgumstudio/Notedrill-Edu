services:
  # ─────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # API  (Express / TypeScript — nodemon hot-reload)
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile.dev
    ports:
      - "8081:8081"
    # Loads real credentials (SMTP, AI API keys, etc.) from api/.env — the
    # `environment:` block below overrides specific keys (Mongo/Redis/JWT)
    # to point at the local containers instead. Compose gives `environment:`
    # precedence over `env_file:` on conflicts.
    env_file:
      - api/.env
    environment:
      NODE_ENV: development
      PORT: "8081"
      # Local MongoDB — overrides any cloud URI from api/.env
      MONGODB_URI: mongodb://mongodb:27017/notedrill_local
      # Redis — enables Bull/BullMQ queues
      REDIS_URL: redis://redis:6379
      # ⚠ Change these before using for anything beyond local testing
      JWT_SECRET: dev_jwt_secret_replace_before_using
      JWT_REFRESH_SECRET: dev_jwt_refresh_secret_replace_before_using
      # Allow the dev web ports so the browser can hit the API.
      # 3003 is this project's web port (3002 is taken by another project
      # running concurrently on this machine) — see the web service below.
      ALLOWED_ORIGINS: "http://localhost:3003,http://localhost:3002,http://localhost:3000"
    volumes:
      # Hot-reload: mount live source into the container
      - ./api/src:/app/api/src
      - ./api/nodemon.json:/app/api/nodemon.json
      - ./packages:/app/packages
      # Manifests — mounted so adding/updating a dependency on the host is
      # visible in the container without an image rebuild. After changing
      # any of these, run: docker compose -f docker-compose.dev.yml exec
      # api sh -c "cd /app && npm ci"   (then restart the api service).
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./api/package.json:/app/api/package.json
      # Named volumes for node_modules — named so they can be explicitly removed
      # when dependencies change: docker volume rm notedrill-edu_api_root_modules
      - api_root_modules:/app/node_modules
      - api_app_modules:/app/api/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Web  (Next.js — next dev hot-reload)
  # ─────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: notedrill-edu/Dockerfile.dev
    ports:
      # Host 3003 -> container 3002 (Next.js still runs on 3002 inside the
      # container). Host port moved off 3002 because another project uses
      # it concurrently on this machine — access this app at :3003.
      - "3003:3002"
    environment:
      NODE_ENV: development
      # Browser-side URL — must be a host-reachable address, NOT the docker service name
      NEXT_PUBLIC_API_URL: http://localhost:8081/api/v1
    volumes:
      - ./notedrill-edu/src:/app/notedrill-edu/src
      - ./notedrill-edu/.env.local:/app/notedrill-edu/.env.local
      - ./notedrill-edu/next.config.ts:/app/notedrill-edu/next.config.ts
      - ./notedrill-edu/tailwind.config.ts:/app/notedrill-edu/tailwind.config.ts
      - ./packages:/app/packages
      # Manifests — see the api service above for why these are mounted.
      # After changing any of these, run: docker compose -f
      # docker-compose.dev.yml exec web sh -c "cd /app && npm ci"
      # (then restart the web service).
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./notedrill-edu/package.json:/app/notedrill-edu/package.json
      - web_root_modules:/app/node_modules
      - web_app_modules:/app/notedrill-edu/node_modules
    depends_on:
      - api
    restart: unless-stopped

# ─────────────────────────────────────────────
# Named volumes (persistent across restarts)
# ─────────────────────────────────────────────
volumes:
  mongodb_data:
  redis_data:
  api_root_modules:
  api_app_modules:
  web_root_modules:
  web_app_modules:
