name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/notedrill-edu
            git pull origin main
            npm install
            npm run build --workspace=@notedrill/types --workspace=@notedrill/shared --workspace=@notedrill/validation
            npm run build --workspace=notedrill-edu
            pm2 restart notedrill-edu-web
            cp /root/notedrill-edu/Caddyfile /etc/caddy/Caddyfile
            systemctl reload caddy
